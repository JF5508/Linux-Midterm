<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storefront</title>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>

    <header>
      <h1>JAVFIL5508 - My Store</h1>
    </header>

    <nav>
      <ul>
        <li><a href="#home">Home</li>
        <li><a href="#products">Products</li>
        <li><a href="#contact">Contact</li>
      </ul>
    </nav>

    <main>
      <section id="products">
        <h2>Product Listing</h2>

        <table>
          <caption>Store Inventory</caption>

          <colgroup>
            <col />
            <col />
            <col />
            <col />
          </colgroup>

          <thead>
            <tr>
              <th>Product Name</th>
              <th>Price</th>
              <th>Category</th>
              <th>Availability</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>Wireless Mouse</td>
              <td>$25</td>
              <td>Electronics</td>
              <td>In Stock</td>
            </tr>

            <tr>
              <td>Notebook</td>
              <td>$5</td>
              <td>Stationery</td>
              <td>In Stock</td>
            </tr>

            <tr>
              <td>Water Bottle</td>
              <td>$12</td>
              <td>Accessories</td>
              <td>Limited</td>
            </tr>
          </tbody>

          <tfoot>
            <tr>
              <td colspan="4">End of Invertory List</td>
            </tr>
          </tfoot>
        </table>
    </main>

    <footer>
      &copy; 2026 My Store
    </footer>
    
  </body>
</html>
